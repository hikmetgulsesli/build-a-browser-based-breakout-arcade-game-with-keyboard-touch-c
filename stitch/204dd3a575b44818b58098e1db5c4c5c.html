<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neon Breakout - Game Board</title>
<!-- Google Fonts -->

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "secondary-fixed": "#f0dbff",
                      "surface-container-high": "#272a31",
                      "surface-container-low": "#191b23",
                      "primary-fixed": "#d8e2ff",

                      "surface-tint": "#adc6ff",

                      "background": "#10131a",

              "borderRadius": {

              "spacing": {
                      "xl": "40px",

                      "base": "4px",
                      "lg": "24px",
                      "md": "16px",
                      "safe": "env(safe-area-inset-bottom)"
              },
              "fontFamily": {
                      "display-lg": ["Hanken Grotesk"],

          }

<style>
        .neon-glow-primary {
            box-shadow: 0 0 12px 2px rgba(173, 198, 255, 0.4);
        }
        .neon-glow-secondary {
            box-shadow: 0 0 10px 1px rgba(221, 183, 255, 0.4);
        }
        .neon-glow-tertiary {
            box-shadow: 0 0 10px 1px rgba(255, 183, 134, 0.4);
        }
        .neon-glow-error {
            box-shadow: 0 0 10px 1px rgba(255, 180, 171, 0.4);
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden flex flex-col font-body-md text-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-margin h-16 md:h-20 bg-surface-dim dark:bg-surface-dim border-b border-outline-variant bg-opacity-80 backdrop-blur-xl">
<!-- Leading Icon -->
<button class="text-on-surface-variant hover:text-primary hover:drop-shadow-[0_0_10px_rgba(173,198,255,0.4)] transition-all flex items-center justify-center p-2 rounded-full hover:bg-surface-variant/30">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<!-- Headline/Brand Logo -->
<div class="text-primary dark:text-primary font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg tracking-tighter drop-shadow-[0_0_8px_rgba(173,198,255,0.5)]">
            NEON BREAKOUT
        </div>
<!-- Trailing Icons -->
<div class="flex items-center gap-2">
<button class="text-on-surface-variant hover:text-primary hover:drop-shadow-[0_0_10px_rgba(173,198,255,0.4)] transition-all flex items-center justify-center p-2 rounded-full hover:bg-surface-variant/30">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">volume_up</span>
</button>
<button class="text-on-surface-variant hover:text-primary hover:drop-shadow-[0_0_10px_rgba(173,198,255,0.4)] transition-all flex items-center justify-center p-2 rounded-full hover:bg-surface-variant/30">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">pause</span>
</button>
<button class="text-on-surface-variant hover:text-primary hover:drop-shadow-[0_0_10px_rgba(173,198,255,0.4)] transition-all flex items-center justify-center p-2 rounded-full hover:bg-surface-variant/30 hidden md:flex">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
</div>
</header>
<!-- Main Game Area -->
<main class="flex-1 w-full h-full flex items-center justify-center pt-20 pb-24 px-4 md:px-8">
<!-- Playfield Container -->
<div class="relative w-full max-w-4xl aspect-[4/3] md:aspect-video bg-[#0F172A] border border-outline-variant rounded-xl overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.8)] flex flex-col items-center">
<!-- Grid Background Lines (Subtle) -->
<div class="absolute inset-0 bg-[linear-gradient(rgba(51,65,85,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(51,65,85,0.1)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none"></div>
<!-- Bricks Area -->
<div class="w-full pt-12 px-8 flex flex-col gap-2 z-10">
<!-- Row 1: Error/Red -->
<div class="flex w-full gap-2 justify-center">
<div class="h-6 flex-1 bg-error rounded-sm border border-white/20 neon-glow-error"></div>
<div class="h-6 flex-1 bg-error rounded-sm border border-white/20 neon-glow-error opacity-0 scale-150 transition-all duration-300"></div> <!-- Shattered Brick -->
<div class="h-6 flex-1 bg-error rounded-sm border border-white/20 neon-glow-error"></div>
<div class="h-6 flex-1 bg-error rounded-sm border border-white/20 neon-glow-error"></div>
<div class="h-6 flex-1 bg-error rounded-sm border border-white/20 neon-glow-error"></div>
<div class="h-6 flex-1 bg-error rounded-sm border border-white/20 neon-glow-error"></div>
</div>
<!-- Row 2: Tertiary/Orange -->
<div class="flex w-full gap-2 justify-center">
<div class="h-6 flex-1 bg-tertiary rounded-sm border border-white/20 neon-glow-tertiary"></div>
<div class="h-6 flex-1 bg-tertiary rounded-sm border border-white/20 neon-glow-tertiary"></div>
<div class="h-6 flex-1 bg-tertiary rounded-sm border border-white/20 neon-glow-tertiary"></div>
<div class="h-6 flex-1 bg-tertiary rounded-sm border border-white/20 neon-glow-tertiary opacity-0 scale-150 transition-all duration-300"></div> <!-- Shattered Brick -->
<div class="h-6 flex-1 bg-tertiary rounded-sm border border-white/20 neon-glow-tertiary"></div>
<div class="h-6 flex-1 bg-tertiary rounded-sm border border-white/20 neon-glow-tertiary"></div>
</div>
<!-- Row 3: Secondary/Purple -->
<div class="flex w-full gap-2 justify-center">
<div class="h-6 flex-1 bg-secondary rounded-sm border border-white/20 neon-glow-secondary"></div>
<div class="h-6 flex-1 bg-secondary rounded-sm border border-white/20 neon-glow-secondary"></div>
<div class="h-6 flex-1 bg-secondary rounded-sm border border-white/20 neon-glow-secondary"></div>
<div class="h-6 flex-1 bg-secondary rounded-sm border border-white/20 neon-glow-secondary"></div>
<div class="h-6 flex-1 bg-secondary rounded-sm border border-white/20 neon-glow-secondary"></div>
<div class="h-6 flex-1 bg-secondary rounded-sm border border-white/20 neon-glow-secondary"></div>
</div>
<!-- Row 4: Primary/Blue -->
<div class="flex w-full gap-2 justify-center">
<div class="h-6 flex-1 bg-primary rounded-sm border border-white/20 neon-glow-primary"></div>
<div class="h-6 flex-1 bg-primary rounded-sm border border-white/20 neon-glow-primary"></div>
<div class="h-6 flex-1 bg-primary rounded-sm border border-white/20 neon-glow-primary"></div>
<div class="h-6 flex-1 bg-primary rounded-sm border border-white/20 neon-glow-primary"></div>
<div class="h-6 flex-1 bg-primary rounded-sm border border-white/20 neon-glow-primary"></div>
<div class="h-6 flex-1 bg-primary rounded-sm border border-white/20 neon-glow-primary"></div>
</div>
</div>
<!-- Particle effect pseudo-element for shattered brick -->
<div class="absolute top-16 left-1/4 w-2 h-2 bg-error rounded-full blur-[1px] shadow-[0_0_10px_#ffb4ab] translate-x-4 translate-y-4"></div>
<div class="absolute top-16 left-1/4 w-1 h-1 bg-error rounded-full blur-[1px] shadow-[0_0_8px_#ffb4ab] -translate-x-6 translate-y-2"></div>
<div class="absolute top-[104px] right-1/3 w-2 h-2 bg-tertiary rounded-full blur-[1px] shadow-[0_0_10px_#ffb786] -translate-x-4 -translate-y-4"></div>
<div class="absolute top-[104px] right-1/3 w-1.5 h-1.5 bg-tertiary rounded-full blur-[1px] shadow-[0_0_8px_#ffb786] translate-x-6 translate-y-6"></div>
<!-- Ball -->
<div class="absolute top-2/3 left-1/2 w-4 h-4 bg-on-surface rounded-full shadow-[0_0_12px_2px_rgba(225,226,236,0.8)] -translate-x-1/2 -translate-y-1/2 z-20"></div>
<!-- Paddle -->
<div class="absolute bottom-8 left-1/2 w-32 h-4 bg-primary rounded-full border border-white/30 neon-glow-primary -translate-x-[40%] z-20"></div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-surface-container-lowest dark:bg-surface-container-lowest border-t border-outline-variant bg-opacity-90 backdrop-blur-md shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
<!-- Item 1: SCORE -->
<div class="flex flex-col items-center justify-center text-primary bg-primary-container/20 rounded-lg py-1 px-4 scale-98 transition-transform">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">leaderboard</span>
<span class="font-hud-label text-hud-label uppercase">SCORE: 2500</span>
</div>
<!-- Item 2: LIVES -->
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant/30 transition-colors py-1 px-4 rounded-lg">
<span class="material-symbols-outlined text-error mb-1" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-hud-label text-hud-label uppercase text-tertiary dark:text-tertiary">LIVES: 3</span>
</div>
<!-- Item 3: LEVEL -->
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant/30 transition-colors py-1 px-4 rounded-lg">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">layers</span>
<span class="font-hud-label text-hud-label uppercase text-tertiary dark:text-tertiary">LEVEL: 04</span>
</div>
<!-- Item 4: INPUT -->
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant/30 transition-colors py-1 px-4 rounded-lg hidden sm:flex">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">keyboard</span>
<span class="font-hud-label text-hud-label uppercase text-tertiary dark:text-tertiary">INPUT: KEYS</span>
</div>
</nav>
</body></html>
